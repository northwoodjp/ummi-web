<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Check-In Kehadiran</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      padding: 20px;
      text-align: center;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      font-size: 16px;
    }

    button {
      margin-top: 20px;
      padding: 12px;
      width: 100%;
      font-size: 16px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #218838;
    }

    .message {
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Check-In Kehadiran</h2>

  <p><strong>ID Registrasi:</strong></p>
  <p id="idDisplay"></p>

  <input type="number" id="jumlahHadir" placeholder="Jumlah hadir aktual" min="1">

  <button onclick="submitCheckin()">Konfirmasi Hadir</button>

  <div class="message" id="message"></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id) {
    document.body.innerHTML = "<h3>ID tidak ditemukan</h3>";
  }

  document.getElementById("idDisplay").innerText = id;

  const GAS_URL = "https://script.google.com/macros/s/AKfycbygtioAq97tGmA8iMyUlbQC6_avtfW-iV5YtTA2KmICfb3Aed-_RHingSA3r1RJKD8QxQ/exec";

  function submitCheckin() {
    const jumlah = document.getElementById("jumlahHadir").value;

    if (!jumlah || jumlah <= 0) {
      alert("Masukkan jumlah hadir yang valid");
      return;
    }

    fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({
        type: "checkin",
        id: id,
        jumlah_hadir_aktual: jumlah
      }),
      headers: {
        "Content-Type": "application/json"
      }
    })
    .then(res => res.json())
    .then(data => {
      if (data.status === "success") {
        document.getElementById("message").innerHTML =
          "✅ Check-in berhasil!";
      } else {
        document.getElementById("message").innerHTML =
          "❌ Gagal: " + data.message;
      }
    })
    .catch(err => {
      document.getElementById("message").innerHTML =
        "❌ Terjadi kesalahan";
    });
  }
</script>

</body>
</html>
