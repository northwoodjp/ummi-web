<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-in Kehadiran</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 2rem 1.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      text-align: center;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.3rem;
      letter-spacing: -0.3px;
    }

    #idText {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 1.5rem;
      min-height: 1.2rem;
    }

    #infoText {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 1rem;
      min-height: 1rem;
    }

    /* ── Input Fields ── */
    .field-group {
      text-align: left;
      margin-bottom: 1.2rem;
    }

    .field-label {
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 0.4rem;
      display: block;
    }

    .field-input {
      width: 100%;
      padding: 14px 16px;
      background: #f7f8fa;
      border: 2px solid #e8eaf0;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a1a2e;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .field-input:focus {
      border-color: var(--accent-gold, #c9a84c);
    }

    .field-input.catatan {
      font-size: 0.95rem;
      font-weight: 400;
      resize: none;
      min-height: 80px;
    }

    /* ── Confirm Button ── */
    #btn {
      width: 100%;
      padding: 18px;
      background: var(--accent-gold, #c9a84c);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: opacity 0.2s, transform 0.1s;
      font-family: 'DM Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #btn:active { transform: scale(0.97); }

    #btn:disabled {
      background: #c8cdd8;
      cursor: default;
      transform: none;
    }

    /* ── Status ── */
    #status {
      margin-top: 1rem;
      font-size: 1rem;
      font-weight: 600;
      min-height: 1.5rem;
    }

    /* ── Locked State ── */
    .locked-icon { font-size: 3rem; margin-bottom: 0.5rem; }

    .locked-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.4rem;
    }

    .locked-subtitle {
      font-size: 0.85rem;
      color: #888;
      line-height: 1.5;
    }

    .locked-countdown {
      margin-top: 1rem;
      background: #f7f8fa;
      border-radius: 12px;
      padding: 0.8rem 1rem;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent-gold, #c9a84c);
      letter-spacing: 1px;
    }
  </style>
</head>

<body>
<div class="card" id="mainCard">
  <!-- content injected by JS -->
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwVmN-dzBacypDOXWGYJfoSpcv8zVo2r9xX0K1MUiOf2qYXtDzEtecOBBqhFpRMlcNC/exec";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const OPEN_TIME = new Date("2026-03-08T14:00:00+09:00");
const now = new Date();
const card = document.getElementById("mainCard");

/* ── LOCKED ── */
if (now < OPEN_TIME) {
  const diff = OPEN_TIME - now;
  const hours = Math.floor(diff / 1000 / 60 / 60);
  const minutes = Math.floor((diff / 1000 / 60) % 60);

  card.innerHTML = `
    <div class="locked-icon">🔒</div>
    <div class="locked-title">Check-in Belum Dibuka</div>
    <div class="locked-subtitle">Dibuka pada<br><strong>8 Maret 2026 · 15:00 JST</strong></div>
    <div class="locked-countdown">${hours} jam ${minutes} menit lagi</div>
  `;

/* ── INVALID QR ── */
} else if (!id) {
  card.innerHTML = `
    <div class="locked-icon">❌</div>
    <div class="locked-title">QR Tidak Valid</div>
    <div class="locked-subtitle">ID tidak ditemukan.<br>Gunakan QR dari WhatsApp konfirmasi.</div>
  `;

/* ── CHECK-IN FORM ── */
} else {
  card.innerHTML = `
    <div class="card-title">Check-in Kehadiran</div>
    <div id="idText">ID: ${id}</div>
    <div id="infoText">Isi data kehadiran Anda</div>

    <div class="field-group">
      <label class="field-label" for="inputJumlah">Jumlah hadir</label>
      <input
        id="inputJumlah"
        class="field-input"
        type="number"
        inputmode="numeric"
        pattern="[0-9]*"
        min="1"
        max="99"
        value="1"
        placeholder="Jumlah orang"
      />
    </div>

    <div class="field-group">
      <label class="field-label" for="inputCatatan">Catatan (opsional)</label>
      <textarea
        id="inputCatatan"
        class="field-input catatan"
        placeholder="Tulis catatan jika ada..."
      ></textarea>
    </div>

    <button id="btn">Konfirmasi Hadir</button>
    <div id="status"></div>
  `;

  const inputJumlah = document.getElementById("inputJumlah");
  const inputCatatan = document.getElementById("inputCatatan");
  const btn = document.getElementById("btn");
  const statusEl = document.getElementById("status");

  function validateInput() {
    const val = parseInt(inputJumlah.value);
    btn.disabled = !(val && val > 0);
  }

  inputJumlah.addEventListener("input", validateInput);
  validateInput();

  btn.addEventListener("click", async () => {
    const jumlah = parseInt(inputJumlah.value);
    const catatan = inputCatatan.value.trim();
    if (!jumlah || jumlah <= 0) return;

    btn.disabled = true;
    btn.textContent = "Memproses...";

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "checkin", id, jumlah_hadir_aktual: jumlah, catatan }),
        headers: { "Content-Type": "text/plain;charset=utf-8" }
      });

      const result = await res.json();

      if (result.status === "success") {
        statusEl.textContent = "✅ Check-in berhasil!";
        statusEl.style.color = "green";
        btn.textContent = "Selesai";
      } else if (result.status === "already") {
        statusEl.textContent = "⚠️ Sudah check-in sebelumnya";
        statusEl.style.color = "orange";
        btn.disabled = false;
        btn.textContent = "Konfirmasi Hadir";
      } else {
        statusEl.textContent = "❌ Gagal check-in";
        statusEl.style.color = "red";
        btn.disabled = false;
        btn.textContent = "Konfirmasi Hadir";
      }
    } catch (err) {
      statusEl.textContent = "❌ Error koneksi";
      statusEl.style.color = "red";
      btn.disabled = false;
      btn.textContent = "Konfirmasi Hadir";
    }
  });
}
</script>
</body>
</html>
