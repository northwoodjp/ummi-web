<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner · Check-in</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c96d;
      --dark: #0f1117;
      --dark2: #1a1d27;
      --dark3: #22263a;
      --text: #e8eaf0;
      --muted: #6b7080;
      --success: #3ecf6a;
      --error: #ff5b5b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── PIN GATE ── */
    #pinGate {
      position: fixed; inset: 0;
      background: var(--dark);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 200; padding: 2rem;
      transition: opacity 0.4s, transform 0.4s;
    }
    #pinGate.hide {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }
    #pinGate::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .pin-logo {
      font-size: 2.6rem; margin-bottom: 0.6rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .pin-eyebrow {
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 0.3rem;
    }
    .pin-title {
      font-size: 1.5rem; font-weight: 700;
      letter-spacing: -0.5px; margin-bottom: 0.4rem;
    }
    .pin-sub {
      font-size: 0.82rem; color: var(--muted);
      margin-bottom: 2rem; text-align: center;
    }

    /* PIN dots display */
    .pin-dots {
      display: flex; gap: 14px; margin-bottom: 1.8rem;
    }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--dark3);
      background: transparent;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .pin-dot.filled {
      background: var(--gold);
      border-color: var(--gold);
      box-shadow: 0 0 10px rgba(201,168,76,0.6);
      transform: scale(1.15);
    }
    .pin-dot.error {
      background: var(--error);
      border-color: var(--error);
      box-shadow: 0 0 10px rgba(255,91,91,0.5);
    }

    /* Numpad */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 260px;
    }
    .num-btn {
      background: var(--dark2);
      border: 1px solid var(--dark3);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      width: 100%; aspect-ratio: 1;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .num-btn:hover { background: var(--dark3); border-color: rgba(201,168,76,0.3); }
    .num-btn:active {
      transform: scale(0.93);
      background: rgba(201,168,76,0.12);
      border-color: var(--gold);
    }
    .num-btn.del {
      font-size: 1rem; color: var(--muted);
    }
    .num-btn.del:hover { color: var(--error); border-color: rgba(255,91,91,0.3); }
    .num-btn.empty { visibility: hidden; cursor: default; }

    .pin-error-msg {
      margin-top: 1.4rem;
      font-size: 0.8rem; color: var(--error);
      height: 1rem;
      transition: opacity 0.2s;
      opacity: 0;
    }
    .pin-error-msg.show { opacity: 1; }

    /* shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }

    /* ── SCANNER (same as original) ── */
    .header { text-align: center; margin-bottom: 1.8rem; z-index: 1; }
    .eyebrow { font-size: 0.7rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 0.4rem; }
    .header h1 { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.5px; }

    .scanner-wrap {
      position: relative; width: 280px; height: 280px;
      border-radius: 20px; overflow: hidden;
      background: #000; z-index: 1; flex-shrink: 0;
    }

    #reader { position: absolute !important; inset: 0 !important; width: 100% !important; height: 100% !important; border: none !important; padding: 0 !important; }
    #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; display: block !important; position: absolute !important; inset: 0 !important; }
    #reader__dashboard, #reader__header_message, #reader__status_span,
    #reader__filescan_input, #html5-qrcode-button-camera-permission,
    #html5-qrcode-button-camera-stop, #html5-qrcode-anchor-scan-type-change,
    #reader__scan_region img, #reader img { display: none !important; }
    #reader__scan_region { border: none !important; padding: 0 !important; position: absolute !important; inset: 0 !important; width: 100% !important; height: 100% !important; }

    .vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%); pointer-events: none; z-index: 2; }

    .corner { position: absolute; width: 36px; height: 36px; border-color: var(--gold); border-style: solid; z-index: 3; pointer-events: none; filter: drop-shadow(0 0 5px rgba(201,168,76,0.9)); }
    .corner.tl { top: 14px;    left: 14px;  border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
    .corner.tr { top: 14px;    right: 14px; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
    .corner.bl { bottom: 14px; left: 14px;  border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }
    .corner.br { bottom: 14px; right: 14px; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }

    .scanline { position: absolute; left: 18px; right: 18px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); border-radius: 2px; box-shadow: 0 0 10px rgba(201,168,76,0.9); z-index: 3; pointer-events: none; animation: scan-move 2s ease-in-out infinite; }
    @keyframes scan-move {
      0%   { top: 18px;  opacity: 1; }
      45%  { top: 250px; opacity: 1; }
      50%  { top: 250px; opacity: 0; }
      52%  { top: 18px;  opacity: 0; }
      55%  { top: 18px;  opacity: 1; }
      100% { top: 18px;  opacity: 1; }
    }

    .flash { position: absolute; inset: 0; background: #fff; opacity: 0; z-index: 4; pointer-events: none; }
    .flash.go { animation: flash-anim 0.35s ease-out forwards; }
    @keyframes flash-anim { 0% { opacity: 0.8; } 100% { opacity: 0; } }

    .status-pill {
      margin-top: 1.4rem; display: flex; align-items: center; gap: 10px;
      background: var(--dark2); border: 1px solid var(--dark3);
      border-radius: 100px; padding: 11px 20px;
      font-size: 0.88rem; font-weight: 500; color: var(--muted);
      transition: all 0.3s; z-index: 1;
    }
    .status-pill.scanning { color: var(--text); border-color: rgba(201,168,76,0.25); }
    .status-pill.found    { color: var(--success); border-color: rgba(62,207,106,0.4); background: rgba(62,207,106,0.07); }
    .status-pill.error    { color: var(--error); border-color: rgba(255,91,91,0.35); background: rgba(255,91,91,0.07); }

    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .status-pill.scanning .dot { background: var(--gold); animation: dot-pulse 1.2s ease-in-out infinite; }
    .status-pill.found .dot    { background: var(--success); }
    .status-pill.error .dot    { background: var(--error); }
    @keyframes dot-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.6); } }

    .cam-btn {
      margin-top: 0.9rem; background: none; border: 1px solid var(--dark3);
      color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
      padding: 8px 18px; border-radius: 100px; cursor: pointer;
      transition: all 0.2s; display: none; z-index: 1;
    }
    .cam-btn:hover { border-color: var(--gold); color: var(--gold); }

    .overlay {
      position: fixed; inset: 0; background: rgba(15,17,23,0.96);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .ov-icon { font-size: 4rem; margin-bottom: 1rem; animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    @keyframes pop { from { transform: scale(0.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .ov-label { font-size: 0.7rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
    .ov-id    { font-size: 1rem; font-weight: 700; color: var(--gold); margin-bottom: 0.2rem; }
    .ov-title { font-size: 1.4rem; font-weight: 700; color: var(--success); margin-bottom: 0.3rem; }
    .ov-sub   { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
    .progress-wrap { width: 200px; height: 3px; background: var(--dark3); border-radius: 3px; overflow: hidden; }
    .progress-bar  { height: 100%; width: 0%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 3px; transition: width linear; }
    .ov-timer { margin-top: 0.8rem; font-size: 0.78rem; color: var(--muted); }
  </style>
</head>
<body>

  <!-- ── PIN GATE ── -->
  <div id="pinGate">
    <div class="pin-logo">🔐</div>
    <div class="pin-eyebrow">Staff Access</div>
    <div class="pin-title">Masukkan PIN</div>
    <div class="pin-sub">Halaman ini hanya untuk staff &amp; admin</div>

    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>

    <div class="numpad">
      <button class="num-btn" onclick="pressNum('1')">1</button>
      <button class="num-btn" onclick="pressNum('2')">2</button>
      <button class="num-btn" onclick="pressNum('3')">3</button>
      <button class="num-btn" onclick="pressNum('4')">4</button>
      <button class="num-btn" onclick="pressNum('5')">5</button>
      <button class="num-btn" onclick="pressNum('6')">6</button>
      <button class="num-btn" onclick="pressNum('7')">7</button>
      <button class="num-btn" onclick="pressNum('8')">8</button>
      <button class="num-btn" onclick="pressNum('9')">9</button>
      <button class="num-btn empty"></button>
      <button class="num-btn" onclick="pressNum('0')">0</button>
      <button class="num-btn del" onclick="pressDelete()">⌫</button>
    </div>

    <div class="pin-error-msg" id="pinError">PIN salah. Coba lagi.</div>
  </div>

  <!-- ── SCANNER ── -->
  <div class="header">
    <div class="eyebrow">Event Check-in</div>
    <h1>Scan QR Code</h1>
  </div>

  <div class="scanner-wrap">
    <div id="reader"></div>
    <div class="vignette"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scanline" id="scanline"></div>
    <div class="flash" id="flash"></div>
  </div>

  <div class="status-pill" id="statusPill">
    <div class="dot"></div>
    <span id="statusText">Menginisialisasi kamera...</span>
  </div>

  <button class="cam-btn" id="camBtn">🔄 Ganti Kamera</button>

  <div class="overlay" id="overlay">
    <div class="ov-icon">✅</div>
    <div class="ov-label">QR Terdeteksi</div>
    <div class="ov-id" id="ovId"></div>
    <div class="ov-title">Membuka Check-in...</div>
    <div class="ov-sub">Harap tunggu sebentar</div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="ov-timer" id="ovTimer"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <script>

    // ── GANTI PIN DI SINI ──
    const CORRECT_PIN = "1234";
    // ─────────────────────

    let pinInput = "";
    const pinGate = document.getElementById("pinGate");
    const pinError = document.getElementById("pinError");
    const dots = [
      document.getElementById("d0"),
      document.getElementById("d1"),
      document.getElementById("d2"),
      document.getElementById("d3"),
    ];

    function updateDots() {
      dots.forEach((d, i) => {
        d.classList.toggle("filled", i < pinInput.length);
        d.classList.remove("error");
      });
    }

    function pressNum(n) {
      if (pinInput.length >= CORRECT_PIN.length) return;
      pinInput += n;
      updateDots();
      if (pinInput.length === CORRECT_PIN.length) {
        setTimeout(checkPin, 120);
      }
    }

    function pressDelete() {
      if (!pinInput.length) return;
      pinInput = pinInput.slice(0, -1);
      updateDots();
      pinError.classList.remove("show");
    }

    function checkPin() {
      if (pinInput === CORRECT_PIN) {
        // Correct — hide gate and start scanner
        pinGate.classList.add("hide");
        setTimeout(() => { pinGate.style.display = "none"; }, 420);
        init(); // start scanner
      } else {
        // Wrong — shake and reset
        dots.forEach(d => { d.classList.remove("filled"); d.classList.add("error"); });
        document.getElementById("pinDots").classList.add("shake");
        pinError.classList.add("show");
        setTimeout(() => {
          document.getElementById("pinDots").classList.remove("shake");
          dots.forEach(d => d.classList.remove("error"));
          pinInput = "";
          updateDots();
        }, 700);
      }
    }

    // keyboard support
    document.addEventListener("keydown", e => {
      if (pinGate.style.display === "none") return;
      if (e.key >= "0" && e.key <= "9") pressNum(e.key);
      if (e.key === "Backspace") pressDelete();
    });

    // ── SCANNER ──
    const statusPill  = document.getElementById("statusPill");
    const statusText  = document.getElementById("statusText");
    const scanline    = document.getElementById("scanline");
    const flash       = document.getElementById("flash");
    const overlay     = document.getElementById("overlay");
    const ovId        = document.getElementById("ovId");
    const progressBar = document.getElementById("progressBar");
    const ovTimer     = document.getElementById("ovTimer");
    const camBtn      = document.getElementById("camBtn");

    let scanner, cameras = [], camIndex = 0, redirecting = false;

    function setStatus(type, msg) {
      statusPill.className = "status-pill " + type;
      statusText.textContent = msg;
    }

    function doFlash() {
      flash.classList.remove("go");
      void flash.offsetWidth;
      flash.classList.add("go");
    }

    function doRedirect(url, displayId) {
      if (redirecting) return;
      redirecting = true;
      doFlash();
      scanline.style.animation = "none";
      setStatus("found", "QR ditemukan!");
      ovId.textContent = displayId || url;
      overlay.classList.add("show");
      const DELAY = 1500;
      progressBar.style.transitionDuration = DELAY + "ms";
      setTimeout(() => progressBar.style.width = "100%", 30);
      ovTimer.textContent = "Mengalihkan dalam 2 detik";
      setTimeout(() => ovTimer.textContent = "Mengalihkan dalam 1 detik", 1000);
      setTimeout(() => { window.location.href = url; }, DELAY);
    }

    function onScan(decodedText) {
      if (redirecting) return;
      let targetUrl, displayId;
      try {
        const parsed = new URL(decodedText);
        const d = parsed.searchParams.get("d");
        if (d) {
          const obj    = JSON.parse(atob(d));
          const id     = obj.id;
          const jumlah = obj.jumlah || 1;
          displayId = id;
          targetUrl = "checkin.html?id=" + encodeURIComponent(id) + "&jumlah=" + jumlah;
        } else {
          const id     = parsed.searchParams.get("id");
          const jumlah = parsed.searchParams.get("jumlah") || "1";
          if (id) {
            displayId = id;
            targetUrl = "checkin.html?id=" + encodeURIComponent(id) + "&jumlah=" + jumlah;
          } else { return; }
        }
      } catch { return; }
      if (scanner) scanner.stop().catch(() => {});
      doRedirect(targetUrl, displayId);
    }

    async function startScanner(cameraId) {
      if (scanner) await scanner.stop().catch(() => {});
      scanner = new Html5Qrcode("reader");
      try {
        await scanner.start(
          cameraId ? { deviceId: { exact: cameraId } } : { facingMode: "environment" },
          { fps: 15, qrbox: { width: 200, height: 200 }, aspectRatio: 1.0 },
          onScan,
          () => {}
        );
        setStatus("scanning", "Arahkan ke QR Code peserta");
      } catch {
        setStatus("error", "Tidak dapat membuka kamera");
      }
    }

    async function init() {
      try {
        cameras = await Html5Qrcode.getCameras();
        if (!cameras?.length) { setStatus("error", "Tidak ada kamera ditemukan"); return; }
        camIndex = cameras.findIndex(c => /back|rear|environment/i.test(c.label));
        if (camIndex === -1) camIndex = cameras.length > 1 ? 1 : 0;
        if (cameras.length > 1) camBtn.style.display = "block";
        await startScanner(cameras[camIndex].id);
      } catch {
        setStatus("error", "Izin kamera ditolak");
      }
    }

    camBtn.addEventListener("click", async () => {
      if (cameras.length < 2) return;
      camIndex = (camIndex + 1) % cameras.length;
      setStatus("scanning", "Mengganti kamera...");
      await startScanner(cameras[camIndex].id);
    });

    // Scanner tidak diinisialisasi sampai PIN benar
  </script>
</body>
</html>
