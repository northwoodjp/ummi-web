<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QR Check-in</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
  :root {
    --gold: #C6A85B;
    --dark: #111111;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--dark);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;

    height: 100vh;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
  }

  .container {
    display: flex;
    flex-direction: column;
    justify-content: top;
    align-items: center;

    height: 100vh;
    padding: 20px;
    box-sizing: border-box;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 10px;
    color: var(--gold);
  }

  #idText {
    margin-bottom: 20px;
    font-size: 16px;
    opacity: 0.8;
  }

  canvas {
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(198,168,91,0.4);
    max-width: 90vw;
  }

  .note {
    margin-top: 25px;
    font-size: 13px;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="container">
  <h1>QR Check-in UMMI</h1>
  <div id="idText"></div>
  <canvas id="qr"></canvas>
  <div class="note">Tunjukkan layar ini ke panitia</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

let id, jumlah;

const d = params.get("d");
if (d) {
  try {
    const obj = JSON.parse(atob(d));
    id = obj.id;
    jumlah = obj.jumlah || 1;
  } catch (e) {
    document.body.innerHTML = "<h2 style='color:red;text-align:center;margin-top:40vh'>Data QR tidak valid</h2>";
    throw new Error("Decode gagal");
  }
} else {
  id = params.get("id");
  jumlah = parseInt(params.get("jumlah")) || 1;
}

if (!id) {
  document.body.innerHTML = "<h2 style='color:red;text-align:center;margin-top:40vh'>ID tidak ditemukan</h2>";
  throw new Error("ID tidak ada");
}

document.getElementById("idText").innerText = "ID Registrasi: " + id;

async function setBrightnessMax() {
  try {
    if ("screen" in window && "brightness" in window.screen) {
      await window.screen.brightness.set(1.0);
    }
  } catch (e) {}
}
setBrightnessMax();

const payload = btoa(JSON.stringify({ id, jumlah }));
const CHECKIN_URL = "https://ummi.jp/qrcode.html?d=" + payload;

QRCode.toCanvas(
  document.getElementById("qr"),
  CHECKIN_URL,
  {
    width: Math.min(window.innerWidth * 0.8, 350),
    color: {
      dark: "#111111",
      light: "#FFFFFF"
    }
  }
);
</script>

</body>
</html>
